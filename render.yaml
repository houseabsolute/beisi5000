# Render.com blueprint. Push to a Git repo connected to Render and it
# will pick this up automatically.
#
# Manual setup alternative (no blueprint): create a Static Site service
# with Build Command `npm install && npm run build` and Publish Directory
# `./dist`.

services:
  - type: web
    name: beisi5000
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    # Long-cache the hashed assets; never cache index.html so deploys
    # take effect immediately on next page load.
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /font/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /soundfont/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
